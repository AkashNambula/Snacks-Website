# Server Settings
server.port=${PORT:8080}

# Datasource Settings (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:amigos_snacks}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configurations (256-bit minimum hex key)
amigos.jwt.secret=${JWT_SECRET:9a67a86c719e5c46e3d2314d3f5b0cd93a123fcdbe314628562d4a51e6b72a4d}
amigos.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload Settings (for Product Image uploading)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Jackson Serialization config
spring.jackson.serialization.fail-on-empty-beans=false
